<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fafafa; color: #111; font-family: 'Inter', sans-serif; }
        .video-card:hover { transform: translateY(-2px); transition: 0.2s ease; }
    </style>
</head>
<body>
    <nav class="flex justify-between items-center p-6 border-b border-gray-100 bg-white sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-tighter text-red-600">YouToo</h1>
        <div class="flex-1 max-w-xl mx-10">
            <input type="text" placeholder="Search videos..." class="w-full px-4 py-2 bg-gray-100 rounded-full focus:outline-none focus:ring-1 focus:ring-gray-300">
        </div>
        <div class="flex gap-4 items-center">
            <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="video-card cursor-pointer">
                <div class="aspect-video bg-gray-200 rounded-xl mb-3"></div>
                <h3 class="font-semibold text-lg leading-tight">Building a Minimalist World</h3>
                <p class="text-gray-500 text-sm mt-1">Creator Name • 1.2M views</p>
            </div>
            </div>
    </main>
</body>
</html>
