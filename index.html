<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body.dark { background-color: #050505; color: #e2e8f0; }
        body.dark .nav-bg { background-color: #111; border-color: #333; }
        body.dark .card-bg { background-color: #161616; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 transition-colors duration-300">
    <nav class="nav-bg p-6 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50 border-b">
        <h1 class="text-3xl font-black text-red-600 tracking-tighter cursor-pointer" onclick="location.reload()">YouToo</h1>
        <input type="text" id="search-input" placeholder="Search for content..." class="border p-2 px-5 rounded-full w-1/3 bg-gray-100 dark:bg-gray-800 dark:border-gray-700 outline-none focus:ring-2 focus:ring-red-500">
        <button onclick="toggleTheme()" class="px-6 py-2 bg-gray-200 dark:bg-gray-700 rounded-full font-bold transition">Toggle Theme</button>
    </nav>
    
    <div class="flex max-w-7xl mx-auto p-6 gap-8">
        <aside class="w-1/6 space-y-8">
            <div>
                <h2 class="font-bold text-gray-400 uppercase text-xs tracking-widest mb-4">Explore</h2>
                <ul class="space-y-4 cursor-pointer font-medium text-sm">
                    <li onclick="fetchVideos('travel')" class="hover:text-red-500 transition">Travel</li>
                    <li onclick="fetchVideos('music')" class="hover:text-red-500 transition">Music</li>
                    <li onclick="fetchVideos('technology')" class="hover:text-red-500 transition">Tech</li>
                    <li onclick="fetchVideos('gaming')" class="hover:text-red-500 transition">Gaming</li>
                </ul>
            </div>
        </aside>
        
        <section class="w-5/6">
            <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="col-span-3 text-center py-20 text-gray-400 animate-pulse">Initializing YouToo engine...</div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
