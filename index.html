<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Minimalist Reset */
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }
        .nav-wrapper { border-bottom: 1px solid #e5e7eb; padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 1000; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 32px; padding: 40px; }
        .sidebar { border-right: 1px solid #e5e7eb; min-height: 100vh; padding: 40px; }
        .card { cursor: pointer; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; transition: 0.2s; }
        .card:hover { border-color: #dc2626; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header class="nav-wrapper">
        <h1 class="text-3xl font-black text-red-600 cursor-pointer" onclick="location.reload()">YouToo</h1>
        <input type="text" id="search-bar" class="w-1/3 border rounded-full px-6 py-2 outline-none focus:ring-2 focus:ring-red-500" placeholder="Search verified human long-form content...">
    </header>
    <div class="flex">
        <aside class="sidebar w-1/6">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-6">Categories</h2>
            <ul class="space-y-4 font-semibold text-gray-800">
                <li class="cursor-pointer hover:text-red-600" onclick="app.fetch('documentaries')">Documentaries</li>
                <li class="cursor-pointer hover:text-red-600" onclick="app.fetch('history')">History</li>
                <li class="cursor-pointer hover:text-red-600" onclick="app.fetch('philosophy')">Philosophy</li>
            </ul>
        </aside>
        <main id="grid" class="content-grid w-5/6"></main>
    </div>
    <script src="script.js"></script>
</body>
</html>
