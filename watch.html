<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch | YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">
    <div class="max-w-5xl mx-auto">
        <div id="player" class="aspect-video bg-black rounded-2xl"></div>
        <div class="mt-6 bg-white p-6 rounded-xl">
            <h1 id="title" class="text-2xl font-bold"></h1>
            <div id="meta" class="text-gray-500 text-sm mt-2"></div>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        
        // Fetch Metadata (Requires another API call to 'videos' endpoint)
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=AIzaSyDpifV8J2_NIouCqiTBiQFTiAt-YH-XNWU`)
        .then(r => r.json()).then(d => {
            const v = d.items[0];
            document.getElementById('title').innerText = v.snippet.title;
            document.getElementById('meta').innerText = `Views: ${v.statistics.viewCount} | Uploaded: ${v.snippet.publishedAt.split('T')[0]}`;
        });
    </script>
</body>
</html>
