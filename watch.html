<!DOCTYPE html>
<html lang="en">
<head><title>Watch | YouToo</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-10">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="font-bold text-red-600">← Back Home</a>
            <input type="text" id="watch-search" placeholder="Search..." class="border rounded-full px-4 py-1">
        </div>
        <div id="player" class="aspect-video bg-black rounded-2xl"></div>
        <div class="mt-8 bg-white p-8 rounded-2xl shadow-sm border">
            <h1 id="title" class="text-3xl font-bold mb-2"></h1>
            <a id="channel-link" class="text-blue-600 font-bold block mb-4"></a>
            <p id="stats" class="text-gray-500 mb-6"></p>
            <p id="desc" class="whitespace-pre-line text-gray-700 leading-relaxed"></p>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
        
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=AIzaSyDpifV8J2_NIouCqiTBiQFTiAt-YH-XNWU`)
        .then(r => r.json()).then(d => {
            const v = d.items[0];
            document.getElementById('title').innerText = v.snippet.title;
            document.getElementById('channel-link').innerText = v.snippet.channelTitle;
            document.getElementById('stats').innerText = `Views: ${parseInt(v.statistics.viewCount).toLocaleString()} | Date: ${new Date(v.snippet.publishedAt).toUTCString()}`;
            document.getElementById('desc').innerText = v.snippet.description;
        });
    </script>
</body>
</html>
