<!DOCTYPE html>
<html lang="en">
<head><title>Watch | YouToo</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-white p-12">
    <div class="max-w-5xl mx-auto">
        <nav class="flex justify-between items-center mb-10 pb-6 border-b">
            <a href="index.html" class="font-bold text-red-600 border px-6 py-2 rounded-full">Back to Home</a>
            <div class="flex gap-4">
                <input type="text" id="w-search" placeholder="Search..." class="border rounded-full px-4 py-2">
                <select id="tz" onchange="updateTime()" class="border rounded-full px-4">
                    <option value="0">UTC +0</option><option value="-5">UTC -5</option><option value="+1">UTC +1</option>
                </select>
            </div>
        </nav>
        <div id="player" class="aspect-video bg-black rounded-lg"></div>
        <div class="mt-10">
            <h1 id="title" class="text-4xl font-bold mb-4"></h1>
            <a id="chan" class="text-blue-800 font-bold underline text-lg mb-4 block"></a>
            <p id="stats" class="text-gray-600 font-bold mb-6 text-sm"></p>
            <p id="desc" class="text-gray-800 text-lg leading-relaxed whitespace-pre-line border-t pt-8"></p>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        let rawDate = '';
        document.getElementById('player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=AIzaSyDpifV8J2_NIouCqiTBiQFTiAt-YH-XNWU`)
        .then(r => r.json()).then(d => {
            const v = d.items[0]; rawDate = v.snippet.publishedAt;
            document.getElementById('title').innerText = v.snippet.title;
            document.getElementById('chan').innerText = v.snippet.channelTitle;
            document.getElementById('desc').innerText = v.snippet.description;
            updateTime();
        });
        function updateTime() {
            const off = parseInt(document.getElementById('tz').value);
            const d = new Date(rawDate); d.setHours(d.getHours() + off);
            document.getElementById('stats').innerText = `Views: ... | Date: ${d.toUTCString()}`;
        }
    </script>
</body>
</html>
